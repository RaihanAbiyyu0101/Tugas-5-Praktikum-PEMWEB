<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umamusume Guide - Drag & Drop Tier List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-icon">U</div>
                <span class="logo-text">U.M.A GUIDE</span>
            </div>
            
            <nav class="navigation">
                <a href="#" id="menu-characters" class="nav-item active"><i class="fa-solid fa-user-group"></i> Characters</a>
                <a href="#" id="menu-support" class="nav-item"><i class="fa-solid fa-id-card"></i> Support Cards</a>
                <a href="#" id="menu-tier-char" class="nav-item"><i class="fa-solid fa-trophy"></i> Tier List Characters</a>
                <a href="#" id="menu-tier-support" class="nav-item"><i class="fa-solid fa-layer-group"></i> Tier List Support</a>
            </nav>
            
            <div class="sidebar-footer">
                <p>&copy; 2026 Umamusume Fan Web</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header" id="searchHeader">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" placeholder="Cari...">
                </div>
            </header>

            <section class="content-section">
                <h2 class="section-title" id="pageTitle">Characters</h2>
                
                <div id="dynamicContainer"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
